# GhostBSD 26.1 (MATE, official image).
#
# GhostBSD ships only a live GUI installer (gbi), which is a front-end for the
# scriptable pc-sysinstall backend. There is no ready-made VM disk image, so we
# boot the live ISO and drive an unattended pc-sysinstall run from a root shell
# on the live system -- see hooks/installOpts.sh and conf/pcinstall.cfg.

VM_ISO_LINK="https://download.ghostbsd.org/releases/amd64/26.1-R15.0p2/GhostBSD-26.1-R15.0p2.iso"

VM_OS_NAME="ghostbsd"
# GhostBSD 26.1 tracks FreeBSD 15. libvirt osinfo usually lacks a freebsd15
# variant on the runner, so reuse the closest known variant.
VM_SSH_PORT=2228
VM_RELEASE=26.1

# Boot the installed disk over the emulated SATA/IDE controller (ada0), which
# SeaBIOS boots reliably from a freshly written GPT disk. pcinstall.cfg targets
# this same device.
VM_DISK="ide"

# pc-sysinstall bakes this root password into the installed system, and sshd is
# enabled there, so the builder can reach the VM with sshpass instead of driving
# a console login (the installed system has no text getty visible at the
# graphical login otherwise -- we disable the display manager, see installOpts).
VM_ROOT_PASSWORD="anyvm.org"
VM_USE_SSHROOT_BUILD_SSH=1

# The installed system boots multi-user to a text console (display manager is
# left disabled by the install), showing a getty "login:" prompt. OCR renders
# "login:" consistently as "logi", so match that. (build.sh waits on this tag
# with NO timeout, so it must be a string OCR actually produces.)
VM_LOGIN_TAG="logi"

VM_SHUTDOWN_CMD="/sbin/shutdown -p now"

VM_INSTALL_CMD="pkg install -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="fusefs-sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG GhostBSD-nfs"
