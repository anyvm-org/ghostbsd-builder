# GhostBSD 26.1 (Gershwin, community preview -- GNUstep based desktop).
#
# Same install flow as the MATE image (conf/ghostbsd-26.1.conf); only the live
# ISO differs. Gershwin is an early community preview, so this image is the most
# likely of the three to need install/timing tuning.

VM_ISO_LINK="https://download.ghostbsd.org/releases/amd64/26.1-R15.0p2/GhostBSD-26.1-R15.0p2-GERSHWIN.iso"

VM_OS_NAME="ghostbsd"
VM_OS_TYPE="freebsd14.0"
VM_SSH_PORT=2230
VM_RELEASE=26.1-gershwin

VM_DISK="ide"

VM_ROOT_PASSWORD="anyvm.org"
VM_USE_SSHROOT_BUILD_SSH=1

# See conf/ghostbsd-26.1.conf -- OCR renders the getty "login:" as "logi".
VM_LOGIN_TAG="logi"

VM_SHUTDOWN_CMD="/sbin/shutdown -p now"

VM_INSTALL_CMD="pkg install -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="fusefs-sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG GhostBSD-nfs"

VM_VBOX="./vbox.sh"

VM_VBOX_LINK="https://raw.githubusercontent.com/anyvm-org/vbox/v1.2.4/vbox.sh"
