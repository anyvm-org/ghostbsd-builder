# pc-sysinstall config for an unattended GhostBSD install (anyvm-org builder).
#
# hooks/installOpts.sh fetches this file over the builder's local HTTP server
# (http://192.168.122.1:8000/conf/pcinstall.cfg) from a root shell on the live
# GhostBSD system and runs:  pc-sysinstall -c /tmp/pcinstall.cfg
#
# The directive set mirrors what GhostBSD's own GUI installer (gbi) writes -- see
# ghostbsd/gbi src/create_cfg.py -- for a "livezfs" full-disk clone of the live
# media onto a single ZFS pool. It is edition-independent: the installer clones
# whatever desktop (MATE / XFCE / Gershwin) is present on the booted live ISO.
#
# NOTE: the exact disk-layout / boot directives below very likely need one round
# of CI tuning against a real run (BIOS-vs-UEFI boot partition, swap layout, the
# display-manager service name). See README.md "Status".

installInteractive=no
installMode=fresh
installType=GhostBSD
installMedium=livezfs
packageType=livezfs

# Localization
localizeLang=en_US
localizeKeyLayout=us
timeZone=UTC
enableNTP=yes

# Network of the running installer (not the installed system); installed-system
# networking is configured via runCommand below.
hostname=ghostbsd

# Disk: full-disk GPT, FreeBSD/BIOS boot code, single OpenZFS root pool.
# The build VM exposes its disk as ada0 (VM_DISK=ide in the conf).
ashift=12
disk0=ada0
partition=all
partscheme=GPT
bootManager=bsd
efiLoader=none
commitDiskPart

# Partition layout for ada0. pc-sysinstall requires the root (/) partition to be
# the FIRST data partition on the disk (it errors with "(/) partition isn't first
# partition on disk" otherwise), so the ZFS root comes first and takes the whole
# disk (size 0 = use the rest). No dedicated swap partition for the VM image.
disk0-part=ZFS 0 /
commitDiskLabel

# Root password (the builder reaches the installed VM with this via sshpass).
rootPass=anyvm.org

# GhostBSD expects a normal login user to exist.
userName=anyvm
userComment=anyvm
userPass=anyvm.org
userShell=/bin/sh
userHome=/home/anyvm
userGroups=wheel,operator
commitUser

# Post-install commands, run inside the freshly installed system. We append to
# /etc/rc.conf and /etc/ssh/sshd_config with echo rather than sysrc: sysrc's
# mktemp intermittently fails in the pc-sysinstall chroot ("mkstemp failed on
# /tmp/.pc-sysinstall/..."), silently dropping settings. Plain echo is reliable.
# (Duplicate rc.conf keys are fine -- rc.conf is sourced top-to-bottom, last wins.)
# 1) Bring up sshd and DHCP so the builder can log in headlessly, and turn off
#    GhostBSD's default firewall. GhostBSD enables ipfw via firewall_enable="YES"
#    with a ruleset that lets ICMP through but FILTERS inbound TCP/22 (the VM pings
#    fine but the SSH connection times out), which blocks the builder's sshpass
#    login. The controlling knob is firewall_enable, NOT ipfw_enable.
runCommand=/bin/sh -c 'echo sshd_enable=YES >> /etc/rc.conf'
runCommand=/bin/sh -c 'echo ifconfig_DEFAULT=DHCP >> /etc/rc.conf'
runCommand=/bin/sh -c 'echo zfs_enable=YES >> /etc/rc.conf'
runCommand=/bin/sh -c 'echo pf_enable=NO >> /etc/rc.conf'
runCommand=/bin/sh -c 'echo firewall_enable=NO >> /etc/rc.conf'
# 2) Disable every common display manager so the image boots to a text console
#    (a getty "login:" prompt), which is what the builder waits for. GhostBSD's
#    default is lightdm; the others are belt-and-suspenders. The desktop is fully
#    installed -- set the relevant *_enable=YES to boot straight to it instead.
runCommand=/bin/sh -c 'echo lightdm_enable=NO >> /etc/rc.conf'
runCommand=/bin/sh -c 'echo slim_enable=NO >> /etc/rc.conf'
runCommand=/bin/sh -c 'echo gdm_enable=NO >> /etc/rc.conf'
runCommand=/bin/sh -c 'echo sddm_enable=NO >> /etc/rc.conf'
runCommand=/bin/sh -c 'echo xdm_enable=NO >> /etc/rc.conf'
#    Also restore the standard getty on ttyv0: GhostBSD ships 'getty ghostbsd'
#    there -- a custom autologin getty that auto-advances to a "Password:" prompt,
#    so a plain "login:" never appears for the builder (VM_LOGIN_TAG=logi) to match.
runCommand=/bin/sh -c 'sed -i.bak -e "s@getty ghostbsd@getty Pc@" /etc/ttys'
# 3) Permit the builder's root/password + env-forwarding SSH login. One echo per
#    line -- a single printf with "\n" does NOT work here (pc-sysinstall strips
#    the backslashes and collapses it into one junk line).
runCommand=/bin/sh -c 'echo PermitRootLogin yes >> /etc/ssh/sshd_config'
runCommand=/bin/sh -c 'echo PasswordAuthentication yes >> /etc/ssh/sshd_config'
runCommand=/bin/sh -c 'echo PermitEmptyPasswords yes >> /etc/ssh/sshd_config'
runCommand=/bin/sh -c 'echo AcceptEnv "*" >> /etc/ssh/sshd_config'
# GhostBSD's sshd defaults to UseDNS=yes; with no reverse DNS for the builder's
# 192.168.122.1, every connection stalls ~10s on the PTR lookup, so build.sh's
# "timeout 2 ssh ... exit" readiness probe never succeeds. Turn it off.
runCommand=/bin/sh -c 'echo UseDNS no >> /etc/ssh/sshd_config'
